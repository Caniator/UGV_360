<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UGV 360° Viewer — MILDA Technologies</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #1E1E1E;
    --surface: #161616;
    --border:  #2a2a2a;
    --red:     #FD4B2A;
    --yellow:  #E5FE00;
    --light:   #DEDFDC;
    --white:   #FFFFFF;
    --muted:   #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--light);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: min(680px, 95vw);
    margin-bottom: 18px;
    gap: 16px;
  }
  .header-logo {
    height: 38px;
    width: auto;
    flex-shrink: 0;
  }
  .header-title { text-align: right; flex: 1; }
  .header-title h1 {
    font-size: clamp(1.1rem, 3vw, 1.7rem);
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--white);
  }
  .header-title h1 span { color: var(--yellow); }
  .header-title .sub {
    font-size: 0.6rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .header-div { width: 1px; height: 44px; background: var(--border); flex-shrink: 0; }

  /* ── VIEWER ── */
  .viewer-wrap { position: relative; width: min(680px, 95vw); }

  .hud-frame {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    background: #0d0d0d;
    box-shadow:
      0 0 0 1px rgba(253,75,42,0.08),
      0 24px 64px rgba(0,0,0,0.75),
      0 0 80px rgba(229,254,0,0.03);
  }
  .hud-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.45) 100%);
    pointer-events: none;
    z-index: 5;
  }

  /* Top bar */
  .hud-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: #111;
    border-bottom: 1px solid var(--border);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--yellow);
    border-radius: 50%;
    margin-right: 7px;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; box-shadow: 0 0 6px var(--yellow); }
    50%      { opacity: 0.3; box-shadow: none; }
  }
  .hud-top .tag { color: var(--red); font-weight: 600; }

  /* Canvas */
  .canvas-area {
    position: relative;
    aspect-ratio: 4/3;
    cursor: grab;
    overflow: hidden;
    background: #0d0d0d;
  }
  .canvas-area:active { cursor: grabbing; }

  .frame {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.22s ease;
    opacity: 0;
  }
  .frame.active { opacity: 1; }
  .frame img {
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 12px;
    filter: brightness(1.05) contrast(1.03);
  }

  /* Crosshair */
  .crosshair { position: absolute; inset: 0; pointer-events: none; z-index: 3; }
  .ch-h, .ch-v { position: absolute; background: var(--yellow); opacity: 0.05; }
  .ch-h { top: 50%; left: 0; right: 0; height: 1px; }
  .ch-v { left: 50%; top: 0; bottom: 0; width: 1px; }

  /* Viewer corner marks */
  .vc { position: absolute; width: 18px; height: 18px; z-index: 4; opacity: 0.55; }
  .vc::before,.vc::after { content:''; position:absolute; background:var(--red); }
  .vc.tl{top:10px;left:10px;} .vc.tl::before{top:0;left:0;width:100%;height:2px;} .vc.tl::after{top:0;left:0;width:2px;height:100%;}
  .vc.tr{top:10px;right:10px;} .vc.tr::before{top:0;right:0;width:100%;height:2px;} .vc.tr::after{top:0;right:0;width:2px;height:100%;}
  .vc.bl{bottom:10px;left:10px;} .vc.bl::before{bottom:0;left:0;width:100%;height:2px;} .vc.bl::after{bottom:0;left:0;width:2px;height:100%;}
  .vc.br{bottom:10px;right:10px;} .vc.br::before{bottom:0;right:0;width:100%;height:2px;} .vc.br::after{bottom:0;right:0;width:2px;height:100%;}

  /* Watermark */
  .canvas-logo {
    position: absolute;
    bottom: 14px; right: 14px;
    height: 22px;
    opacity: 0.18;
    z-index: 6;
    pointer-events: none;
    filter: brightness(10);
  }

  /* Bottom bar */
  .hud-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    background: #111;
    border-top: 1px solid var(--border);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .angle-display {
    font-size: 0.9rem; font-weight: 700;
    color: var(--yellow); min-width: 55px; letter-spacing: 0.05em;
  }
  .arc-display { display:flex; align-items:center; gap:4px; }
  .arc-pip {
    width: 22px; height: 3px; border-radius: 1px;
    background: var(--border);
    transition: background 0.2s, box-shadow 0.2s;
  }
  .arc-pip.active { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }

  /* Controls */
  .controls {
    display: flex; align-items: center;
    justify-content: center; gap: 10px; margin-top: 14px;
  }
  .btn {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.68rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 8px 18px; background: transparent;
    border: 1px solid var(--border); color: var(--muted);
    border-radius: 2px; cursor: pointer; transition: all 0.18s;
  }
  .btn:hover { border-color: var(--red); color: var(--red); box-shadow: 0 0 12px rgba(253,75,42,0.2); }
  .btn.active { border-color: var(--yellow); color: var(--bg); background: var(--yellow); box-shadow: 0 0 20px rgba(229,254,0,0.35); }
  .btn.active:hover { border-color: var(--yellow); color: var(--bg); }

  .speed-wrap { display:flex; align-items:center; gap:8px; margin-left:4px; }
  .speed-label { font-size:0.6rem; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
  #speedLabel { color:var(--light); font-weight:700; }

  .drag-hint {
    text-align: center; font-size: 0.58rem; font-weight: 500;
    color: var(--muted); margin-top: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
  }

  /* Thumbnails */
  .thumb-strip { display:flex; gap:6px; margin-top:12px; justify-content:center; }
  .thumb {
    width: 58px; height: 44px;
    border: 1px solid var(--border); border-radius: 2px;
    overflow: hidden; cursor: pointer;
    transition: all 0.18s; opacity: 0.4; flex-shrink: 0;
  }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  .thumb:hover { opacity:0.75; border-color:var(--red); }
  .thumb.active { opacity:1; border-color:var(--yellow); box-shadow:0 0 10px rgba(229,254,0,0.3); }

  /* Specs */
  .specs {
    display: flex; margin-top: 16px;
    font-size: 0.58rem; font-weight: 500;
    color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
    justify-content: center;
    border: 1px solid var(--border); border-radius: 2px; overflow: hidden;
  }
  .spec-item { padding: 7px 14px; border-right: 1px solid var(--border); white-space: nowrap; }
  .spec-item:last-child { border-right: none; }
  .spec-item .val { color:var(--yellow); font-weight:700; display:block; margin-top:2px; font-size:0.65rem; }

  /* Footer */
  .footer {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-top: 14px; opacity: 0.35;
  }
  .footer img { height: 18px; filter: brightness(10) saturate(0); }
  .footer span { font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
</style>
</head>
<body>

<div class="header">
  <img class="header-logo" src="logo.png" alt="MILDA Technologies">
  <div class="header-div"></div>
  <div class="header-title">
    <h1>UGV <span>Platform</span></h1>
    <div class="sub">Unmanned Ground Vehicle &nbsp;·&nbsp; 360° Inspection</div>
  </div>
</div>

<div class="viewer-wrap">
  <div class="hud-frame">
    <div class="hud-top">
      <div><span class="status-dot"></span>Live Feed — CAM_3D_ORBIT</div>
      <div class="tag" id="frameLabel">VIEW: FRONT_0°</div>
      <div>RES&nbsp;5472×3648</div>
    </div>

    <div class="canvas-area" id="canvas">
      <div class="crosshair"><div class="ch-h"></div><div class="ch-v"></div></div>
      <div class="vc tl"></div><div class="vc tr"></div>
      <div class="vc bl"></div><div class="vc br"></div>
      <img class="canvas-logo" src="logo.png" alt="">
    </div>

    <div class="hud-bottom">
      <div class="angle-display" id="angleDisplay">000°</div>
      <div class="arc-display" id="arcDisplay"></div>
      <div id="frameCounter">Frame 1 / 5</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="step(-1)">◀ Prev</button>
    <button class="btn active" id="btnAuto" onclick="toggleAuto()">⟳ Auto</button>
    <button class="btn" onclick="step(1)">Next ▶</button>
    <div class="speed-wrap">
      <span class="speed-label">Speed: <span id="speedLabel">1×</span></span>
      <button class="btn" onclick="cycleSpeed()">SPD</button>
    </div>
  </div>

  <div class="drag-hint">← Drag to rotate &nbsp;·&nbsp; Click thumbnails below →</div>
  <div class="thumb-strip" id="thumbStrip"></div>

  <div class="specs">
    <div class="spec-item">Drive<span class="val">4WD Independent</span></div>
    <div class="spec-item">Tires<span class="val">Airless + All-Terrain</span></div>
    <div class="spec-item">Lights<span class="val">LED + IR Rear</span></div>
    <div class="spec-item">Sensor<span class="val">Depth Cam ×2</span></div>
  </div>

  <div class="footer">
    <img src="logo.png" alt="MILDA Technologies">
    <span>milda.technologies</span>
  </div>
</div>

<script>
const frames = [
  { src: 'ugv-front.jpg',       label: 'front',       angle: 0   },
  { src: 'ugv-front-right.jpg', label: 'front_right', angle: 72  },
  { src: 'ugv-rear-right.jpg',  label: 'rear_right',  angle: 144 },
  { src: 'ugv-rear-side.jpg',   label: 'rear_side',   angle: 216 },
  { src: 'ugv-front-left.jpg',  label: 'front_left',  angle: 288 },
];
const labels = ['FRONT_0°','FRONT-RIGHT_72°','REAR-RIGHT_144°','REAR-SIDE_216°','FRONT-LEFT_288°'];
let current = 0, autoPlay = true, interval = null, speed = 0;
const delays = [1200, 600, 2400];
const speedLabels = ['1×','2×','0.5×'];

const canvas = document.getElementById('canvas');
const angleDisplay = document.getElementById('angleDisplay');
const frameLabel = document.getElementById('frameLabel');
const frameCounter = document.getElementById('frameCounter');
const arcDisplay = document.getElementById('arcDisplay');
const thumbStrip = document.getElementById('thumbStrip');

frames.forEach((f, i) => {
  const div = document.createElement('div');
  div.className = 'frame'+(i===0?' active':'');
  div.id = 'frame'+i;
  const img = document.createElement('img');
  img.src = f.src; img.draggable = false;
  div.appendChild(img);
  canvas.insertBefore(div, canvas.firstChild);
});

frames.forEach((f, i) => {
  const t = document.createElement('div');
  t.className = 'thumb'+(i===0?' active':'');
  t.id = 'thumb'+i; t.onclick = ()=>goTo(i);
  const img = document.createElement('img'); img.src = f.src;
  t.appendChild(img); thumbStrip.appendChild(t);
});

frames.forEach((_,i) => {
  const pip = document.createElement('div');
  pip.className = 'arc-pip'+(i===0?' active':'');
  pip.id = 'pip'+i; arcDisplay.appendChild(pip);
});

function goTo(idx) {
  ['frame','thumb','pip'].forEach(p=>document.getElementById(p+current).classList.remove('active'));
  current = ((idx%frames.length)+frames.length)%frames.length;
  ['frame','thumb','pip'].forEach(p=>document.getElementById(p+current).classList.add('active'));
  angleDisplay.textContent = String(frames[current].angle).padStart(3,'0')+'°';
  frameLabel.textContent = 'VIEW: '+labels[current];
  frameCounter.textContent = 'Frame '+(current+1)+' / '+frames.length;
}

function step(dir) { goTo(current+dir); }
function startAuto() { clearInterval(interval); interval=setInterval(()=>step(1),delays[speed]); }
function toggleAuto() {
  autoPlay=!autoPlay;
  document.getElementById('btnAuto').classList.toggle('active',autoPlay);
  autoPlay?startAuto():clearInterval(interval);
}
function cycleSpeed() {
  speed=(speed+1)%3;
  document.getElementById('speedLabel').textContent=speedLabels[speed];
  if(autoPlay) startAuto();
}

let dragStart=null, dragFrame=null;
canvas.addEventListener('mousedown',e=>{dragStart=e.clientX;dragFrame=current;if(autoPlay)clearInterval(interval);});
document.addEventListener('mousemove',e=>{
  if(dragStart===null)return;
  const nf=((dragFrame+Math.round((e.clientX-dragStart)/60))%frames.length+frames.length)%frames.length;
  if(nf!==current)goTo(nf);
});
document.addEventListener('mouseup',()=>{if(dragStart!==null&&autoPlay)startAuto();dragStart=null;});
canvas.addEventListener('touchstart',e=>{dragStart=e.touches[0].clientX;dragFrame=current;if(autoPlay)clearInterval(interval);},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(dragStart===null)return;
  const nf=((dragFrame+Math.round((e.touches[0].clientX-dragStart)/60))%frames.length+frames.length)%frames.length;
  if(nf!==current)goTo(nf);
},{passive:true});
canvas.addEventListener('touchend',()=>{if(dragStart!==null&&autoPlay)startAuto();dragStart=null;});

if(autoPlay) startAuto();
</script>
</body>
</html>
